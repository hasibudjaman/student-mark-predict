<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Predictor</title>

    <style>

        body{
            font-family:Arial;
            background: linear-gradient(135deg,#74ebd5,#9face6);
            text-align:center;
            margin:0;
            padding:0;
        }

        .container{
            width:400px;
            margin:100px auto;
            background:white;
            padding:35px;
            border-radius:20px;
            box-shadow:0px 8px 25px rgba(0,0,0,0.2);
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        p{
            color:#666;
        }

        input{
            width:85%;
            padding:12px;
            margin-top:15px;
            border:2px solid #ddd;
            border-radius:8px;
            font-size:16px;
        }

        input:focus{
            border-color:#4CAF50;
            outline:none;
        }

        button{
            margin-top:20px;
            padding:12px 30px;
            background:#4CAF50;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#45a049;
        }

        .result{
            margin-top:25px;
            background:#f3fff3;
            padding:15px;
            border-radius:10px;
            font-size:24px;
            font-weight:bold;
            color:#2d7a2d;
        }

    </style>
</head>

<body>

<div class="container">

<h2>📊 Student Marks Predictor</h2>

<p>Enter Study Hours (0 to 12)</p>

<form method="POST">

<input
type="number"
name="hours"
placeholder="Enter study hours"
min="0"
max="12"
step="0.5"
required
>

<br>

<button type="submit">
Predict
</button>

</form>

{% if prediction %}

<div class="result">
🎯 Predicted Marks: {{ prediction }}
</div>

{% endif %}

</div>

</body>
</html>
